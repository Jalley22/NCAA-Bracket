<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 March Madness Bracket</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080b10; --surface: #12181f; --border: #253040;
  --text: #ccd6e0; --muted: #50647a; --accent: #f5a623;
  --green: #22c55e; --red: #ef4444;
  --line: rgba(60,110,170,0.5);
  --game-w: 158px; --round-w: 182px; --conn: 24px; --slot-h: 86px;
  --east-c: #4a9adb; --south-c: #e05555; --west-c: #46b86a; --midwest-c: #e08c30;
}
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; overflow-x: auto; }
header {
  background: linear-gradient(180deg,#120e00 0%,var(--bg) 100%);
  border-bottom: 2px solid #2a1e00; padding: 14px 24px 10px;
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between; min-width: 1700px;
}
.header-title h1 {
  font-family: 'Bebas Neue'; font-size: 2.2rem; letter-spacing: .14em;
  background: linear-gradient(90deg,#c87d10,#ffd060,#f5a623);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-title p { font-size: .65rem; color: var(--muted); letter-spacing: .2em; text-transform: uppercase; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
.score-badge { font-family: 'Bebas Neue'; font-size: 1rem; letter-spacing: .1em; color: var(--green); background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); padding: 4px 12px; border-radius: 3px; display: none; }
.champ-badge { font-family: 'Bebas Neue'; font-size: 1rem; letter-spacing: .1em; color: var(--accent); }
.sync-bar { display: flex; align-items: center; gap: 6px; }
.sync-status { font-size: .62rem; letter-spacing: .1em; color: var(--muted); }
.sync-status.ok { color: var(--green); } .sync-status.live { color: #ff9090; } .sync-status.err { color: #ff6060; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.sync-dot.live { background: #ff5555; animation: blink 1.2s infinite; } .sync-dot.ok { background: var(--green); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.btn { font-family: 'Bebas Neue'; font-size: .9rem; letter-spacing: .1em; padding: 5px 14px; cursor: pointer; border-radius: 3px; transition: background .15s; }
.btn-refresh { background: rgba(74,154,219,.12); border: 1px solid rgba(74,154,219,.4); color: #7ab8e8; }
.btn-refresh:hover { background: rgba(74,154,219,.25); }
.btn-reset { background: rgba(245,166,35,.12); border: 1px solid var(--accent); color: var(--accent); }
.btn-reset:hover { background: rgba(245,166,35,.28); }
.mode-toggle { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.mode-btn { font-family: 'Bebas Neue'; font-size: .85rem; letter-spacing: .1em; padding: 5px 12px; cursor: pointer; border: none; transition: background .15s, color .15s; background: transparent; color: var(--muted); }
.mode-btn.active-picks { background: rgba(245,166,35,.2); color: var(--accent); }
.mode-btn.active-results { background: rgba(239,68,68,.2); color: #ff8080; }
.mode-banner { padding: 4px 24px; font-size: .65rem; font-weight: 700; letter-spacing: .18em; text-align: center; text-transform: uppercase; min-width: 1700px; display: none; }
.mode-banner.results { background: rgba(239,68,68,.1); border-bottom: 1px solid rgba(239,68,68,.25); color: #ff8080; display: block; }

.bracket-wrap { padding: 20px; min-width: 1700px; }
.bracket { display: flex; flex-direction: row; align-items: flex-start; }
.half { display: flex; flex-direction: column; gap: 28px; }
.region { display: flex; flex-direction: column; }
.region-label { font-family: 'Bebas Neue'; font-size: .95rem; letter-spacing: .2em; text-align: center; padding: 3px 0 5px; border-bottom: 1px solid var(--border); }
.rounds { display: flex; flex-direction: row; height: calc(8 * var(--slot-h)); }
.right-half .rounds { flex-direction: row-reverse; }
.round { display: flex; flex-direction: column; width: var(--round-w); }
.round-label { font-size: .58rem; text-transform: uppercase; letter-spacing: .18em; color: var(--muted); text-align: center; padding: 0 0 4px; flex-shrink: 0; }
.gw { flex: 1; display: flex; align-items: center; position: relative; padding: 2px 0; }
.left-half  .gw::before { content:''; position:absolute; right:0; top:50%; transform:translateY(-50%); width:var(--conn); height:1px; background:var(--line); }
.right-half .gw::before { content:''; position:absolute; left:0;  top:50%; transform:translateY(-50%); width:var(--conn); height:1px; background:var(--line); }
.conn { position:absolute; width:var(--conn); }
.left-half  .gw .conn { right:0; } .right-half .gw .conn { left:0; }
.left-half  .gw .conn.bottom { top:50%; height:50%; border-right:1px solid var(--line); border-top:1px solid var(--line); }
.left-half  .gw .conn.top    { top:0;   height:50%; border-right:1px solid var(--line); border-bottom:1px solid var(--line); }
.right-half .gw .conn.bottom { top:50%; height:50%; border-left:1px solid var(--line);  border-top:1px solid var(--line); }
.right-half .gw .conn.top    { top:0;   height:50%; border-left:1px solid var(--line);  border-bottom:1px solid var(--line); }

.game { width:var(--game-w); border:1px solid var(--border); border-radius:4px; overflow:hidden; background:var(--surface); flex-shrink:0; }
.game.results-mode { border-color:rgba(239,68,68,.35); }
.game.is-live  { border-color:rgba(255,85,85,.6);  box-shadow:0 0 8px rgba(255,85,85,.15); }
.game.is-final { border-color:rgba(60,110,170,.45); }

.team { display:flex; align-items:center; gap:4px; width:100%; padding:4px 6px 2px; cursor:pointer; border:none; background:transparent; color:var(--text); font-family:'Barlow'; font-size:.72rem; font-weight:600; text-align:left; transition:background .14s; white-space:nowrap; overflow:hidden; min-height:22px; }
.team:hover:not([disabled]) { background:rgba(255,255,255,.07); }
.team .sd { font-size:.6rem; color:var(--muted); min-width:14px; font-weight:700; flex-shrink:0; }
.team .nm { overflow:hidden; text-overflow:ellipsis; flex:1; }
.team .sc { font-family:'Bebas Neue'; font-size:.9rem; letter-spacing:.02em; flex-shrink:0; color:var(--muted); min-width:18px; text-align:right; }
.team .vd { font-size:.72rem; flex-shrink:0; margin-left:2px; }

.team.picked    { background:rgba(245,166,35,.12); color:var(--accent); }
.team.picked .sd { color:rgba(245,166,35,.5); }
.team.unpicked  { background:rgba(255,255,255,.03); color:var(--muted); }
.team.unpicked .nm { text-decoration:line-through; }
.team.tbd       { color:var(--muted); cursor:default; font-weight:400; font-style:italic; }
.team.correct   { background:rgba(34,197,94,.15); color:var(--green); }
.team.correct .sd { color:rgba(34,197,94,.5); }
.team.correct .sc { color:rgba(34,197,94,.8); }
.team.wrong     { background:rgba(239,68,68,.08); color:var(--muted); }
.team.wrong .nm { text-decoration:line-through; }
.team.actual-win  { background:rgba(239,68,68,.18); color:#ff9090; }
.team.actual-win .sd { color:rgba(239,68,68,.5); }
.team.actual-win .sc { color:#ffaaaa; font-size:1rem; }
.team.actual-loss { background:rgba(255,255,255,.03); color:var(--muted); }
.team.actual-loss .nm { text-decoration:line-through; }
.team.leading   { } /* live leader */
.team.leading .sc { color:#ff8080; font-size:1rem; }
.team.trailing .sc { color:var(--muted); }

.game-footer { font-size:.54rem; letter-spacing:.1em; text-align:center; padding:1px 4px 3px; color:var(--muted); text-transform:uppercase; border-top:1px solid rgba(255,255,255,.04); }
.game-footer.live  { color:#ff7070; }
.game-footer.final { color:rgba(74,154,219,.7); }

.divline { height:1px; background:var(--border); }

.center { display:flex; flex-direction:column; justify-content:center; align-items:center; width:240px; height:calc(2 * 8 * var(--slot-h) + 28px); padding:0 8px; border-left:1px solid var(--border); border-right:1px solid var(--border); }
.center-inner { display:flex; flex-direction:column; align-items:center; gap:14px; width:100%; }
.ff-title    { font-family:'Bebas Neue'; font-size:.85rem; letter-spacing:.22em; color:var(--muted); text-align:center; }
.champ-title { font-family:'Bebas Neue'; font-size:.95rem; letter-spacing:.2em; color:var(--accent); text-align:center; }
.ff-matchup  { font-size:.58rem; color:var(--muted); text-align:center; margin-bottom:3px; letter-spacing:.08em; text-transform:uppercase; }
.champ-winner { text-align:center; padding:12px 8px; width:100%; border:1px solid rgba(245,166,35,.4); border-radius:6px; background:rgba(245,166,35,.05); }
.champ-winner .trophy { font-size:1.8rem; display:block; margin-bottom:4px; }
.champ-winner .cname  { font-family:'Bebas Neue'; font-size:1.3rem; letter-spacing:.1em; color:var(--accent); }
.champ-winner .csub   { font-size:.6rem; color:var(--muted); letter-spacing:.15em; text-transform:uppercase; }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>2026 MARCH MADNESS</h1>
    <p>NCAA Division I Men's Basketball Tournament &mdash; Your Personal Bracket</p>
  </div>
  <div class="header-right">
    <div class="champ-badge" id="header-champ"></div>
    <div class="score-badge" id="header-score"></div>
    <div class="sync-bar">
      <span class="sync-dot" id="sync-dot"></span>
      <span class="sync-status" id="sync-status">Not synced</span>
    </div>
    <button class="btn btn-refresh" onclick="fetchESPN()">&#8635; SYNC SCORES</button>
    <div class="mode-toggle">
      <button class="mode-btn active-picks"  id="btn-picks"   onclick="setMode('picks')">&#9998; MY PICKS</button>
      <button class="mode-btn"               id="btn-results" onclick="setMode('results')">&#10003; RESULTS</button>
    </div>
    <button class="btn btn-reset" onclick="resetPrompt()">&#215; RESET</button>
  </div>
</header>
<div class="mode-banner" id="mode-banner">&#9888; RESULTS MODE &mdash; Click the actual winner, or SYNC SCORES to auto-fill from ESPN</div>

<div class="bracket-wrap">
  <div class="bracket" id="bracket"></div>
</div>

<script>
var PICKS_KEY   = 'mm2026_picks';
var RESULTS_KEY = 'mm2026_results';
var SCORES_KEY  = 'mm2026_scores';
var ROUND_NAMES = ['First Round','Second Round','Sweet 16','Elite Eight'];
var POINTS      = [10,20,40,80,160,320];
var ESPN_URL    = 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=20260319-20260406&groups=100&limit=200';
var PROXIES     = ['','https://corsproxy.io/?','https://api.allorigins.win/raw?url='];

var ESPN_MAP = {
  'DUKE':'Duke','SIE':'Siena','OSU':'Ohio State','TCU':'TCU',
  'SJU':"St. John's",'UNI':'N. Iowa','KU':'Kansas','CBU':'Cal Baptist',
  'LOU':'Louisville','USF':'S. Florida','MSU':'Mich. State','NDSU':'N. Dakota St.',
  'UCLA':'UCLA','UCF':'UCF','CONN':'UConn','FUR':'Furman',
  'FLA':'Florida','PV':'Prairie View','CLEM':'Clemson','IOWA':'Iowa',
  'VAN':'Vanderbilt','MCNS':'McNeese','NEB':'Nebraska','TROY':'Troy',
  'UNC':'N. Carolina','VCU':'VCU','ILL':'Illinois','PENN':'Penn',
  'SMC':"Saint Mary's",'TXAM':'Texas A&M','HOU':'Houston','IDHO':'Idaho',
  'ARIZ':'Arizona','LIU':'LIU','WIS':'Wisconsin','HP':'High Point',
  'VILL':'Villanova','USU':'Utah State','ARK':'Arkansas','HAW':"Hawai'i",
  'MIA':'Miami (FL)','MIZZ':'Missouri','GONZ':'Gonzaga','KENN':'Kennesaw St.',
  'BYU':'BYU','TEX':'Texas','PUR':'Purdue','QUC':'Queens',
  'MICH':'Michigan','HOW':'Howard','UGA':'Georgia','SLU':'Saint Louis',
  'ALA':'Alabama','HOF':'Hofstra','TTU':'Texas Tech','AKR':'Akron',
  'TENN':'Tennessee','M-OH':'Miami (OH)','UVA':'Virginia','WRST':'Wright State',
  'UK':'Kentucky','SCU':'Santa Clara','ISU':'Iowa State','TNST':'Tenn. State',
  'HPU':'High Point','UTST':'Utah State','KEST':'Kennesaw St.','TSU':'Tenn. State',
  'SFLA':'S. Florida','MCNE':'McNeese','PRVU':'Prairie View'
};

var RD = {
  e:{ name:'EAST', color:'var(--east-c)', r64:[
    [{s:1,n:'Duke'},{s:16,n:'Siena'}],
    [{s:8,n:'Ohio State'},{s:9,n:'TCU'}],
    [{s:5,n:"St. John's"},{s:12,n:'N. Iowa'}],
    [{s:4,n:'Kansas'},{s:13,n:'Cal Baptist'}],
    [{s:6,n:'Louisville'},{s:11,n:'S. Florida'}],
    [{s:3,n:'Mich. State'},{s:14,n:'N. Dakota St.'}],
    [{s:7,n:'UCLA'},{s:10,n:'UCF'}],
    [{s:2,n:'UConn'},{s:15,n:'Furman'}]
  ]},
  s:{ name:'SOUTH', color:'var(--south-c)', r64:[
    [{s:1,n:'Florida'},{s:16,n:'Prairie View'}],
    [{s:8,n:'Clemson'},{s:9,n:'Iowa'}],
    [{s:5,n:'Vanderbilt'},{s:12,n:'McNeese'}],
    [{s:4,n:'Nebraska'},{s:13,n:'Troy'}],
    [{s:6,n:'N. Carolina'},{s:11,n:'VCU'}],
    [{s:3,n:'Illinois'},{s:14,n:'Penn'}],
    [{s:7,n:"Saint Mary's"},{s:10,n:'Texas A&M'}],
    [{s:2,n:'Houston'},{s:15,n:'Idaho'}]
  ]},
  w:{ name:'WEST', color:'var(--west-c)', r64:[
    [{s:1,n:'Arizona'},{s:16,n:'LIU'}],
    [{s:8,n:'Wisconsin'},{s:9,n:'High Point'}],
    [{s:5,n:'Villanova'},{s:12,n:'Utah State'}],
    [{s:4,n:'Arkansas'},{s:13,n:"Hawai'i"}],
    [{s:6,n:'Miami (FL)'},{s:11,n:'Missouri'}],
    [{s:3,n:'Gonzaga'},{s:14,n:'Kennesaw St.'}],
    [{s:7,n:'BYU'},{s:10,n:'Texas'}],
    [{s:2,n:'Purdue'},{s:15,n:'Queens'}]
  ]},
  m:{ name:'MIDWEST', color:'var(--midwest-c)', r64:[
    [{s:1,n:'Michigan'},{s:16,n:'Howard'}],
    [{s:8,n:'Georgia'},{s:9,n:'Saint Louis'}],
    [{s:5,n:'Alabama'},{s:12,n:'Hofstra'}],
    [{s:4,n:'Texas Tech'},{s:13,n:'Akron'}],
    [{s:6,n:'Tennessee'},{s:11,n:'Miami (OH)'}],
    [{s:3,n:'Virginia'},{s:14,n:'Wright State'}],
    [{s:7,n:'Kentucky'},{s:10,n:'Santa Clara'}],
    [{s:2,n:'Iowa State'},{s:15,n:'Tenn. State'}]
  ]}
};

// ── State ─────────────────────────────────────────────────
var picks={}, results={}, gameScores={}, mode='picks', lastSync=null, syncTimer=null;
try{var _p=localStorage.getItem(PICKS_KEY);  if(_p)picks=JSON.parse(_p);}catch(_e){}
try{var _r=localStorage.getItem(RESULTS_KEY);if(_r)results=JSON.parse(_r);}catch(_e){}
try{var _s=localStorage.getItem(SCORES_KEY); if(_s)gameScores=JSON.parse(_s);}catch(_e){}
function savePicks()  {try{localStorage.setItem(PICKS_KEY,  JSON.stringify(picks));}catch(_e){}}
function saveResults(){try{localStorage.setItem(RESULTS_KEY,JSON.stringify(results));}catch(_e){}}
function saveScores() {try{localStorage.setItem(SCORES_KEY, JSON.stringify(gameScores));}catch(_e){}}

// ── Helpers ───────────────────────────────────────────────
function gid(reg,rd,g){return reg+'_'+rd+'_'+g;}
function getTeams(reg,rd,g){
  if(rd===0)return RD[reg].r64[g];
  return[picks[gid(reg,rd-1,g*2)]||null,picks[gid(reg,rd-1,g*2+1)]||null];
}
function getResultTeams(reg,rd,g){
  if(rd===0)return RD[reg].r64[g];
  return[results[gid(reg,rd-1,g*2)]||null,results[gid(reg,rd-1,g*2+1)]||null];
}
function e8Winner(reg){return picks[gid(reg,3,0)]||null;}
function e8Result(reg){return results[gid(reg,3,0)]||null;}
function safeAttr(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,'\\x27').replace(/"/g,'&quot;');}
function sN(t){return t?safeAttr(t.n):'';}
function sS(t){return t?(t.s||0):0;}
function getAllSeeds(){var m={};var regs=['e','s','w','m'];for(var ri=0;ri<regs.length;ri++){var r64=RD[regs[ri]].r64;for(var gi=0;gi<r64.length;gi++){m[r64[gi][0].n]=r64[gi][0].s;m[r64[gi][1].n]=r64[gi][1].s;}}return m;}

// ── Matchup index ─────────────────────────────────────────
function buildIdx(){
  var idx={};
  function add(a,b,id){if(!a||!b)return;idx[a+'|'+b]=id;idx[b+'|'+a]=id;}
  var regs=['e','s','w','m'];
  for(var ri=0;ri<regs.length;ri++){
    var reg=regs[ri];
    for(var g=0;g<8;g++){var ts=RD[reg].r64[g];add(ts[0].n,ts[1].n,gid(reg,0,g));}
    for(var r=1;r<=3;r++){var nG=Math.pow(2,3-r);for(var g2=0;g2<nG;g2++){var ts2=getResultTeams(reg,r,g2);add(ts2[0]?ts2[0].n:null,ts2[1]?ts2[1].n:null,gid(reg,r,g2));}}
  }
  var f0a=e8Result('e'),f0b=e8Result('s'),f1a=e8Result('w'),f1b=e8Result('m');
  add(f0a?f0a.n:null,f0b?f0b.n:null,'ff0');
  add(f1a?f1a.n:null,f1b?f1b.n:null,'ff1');
  var ca=results['ff0'],cb=results['ff1'];add(ca?ca.n:null,cb?cb.n:null,'ch');
  return idx;
}

function mapName(abbr,display){
  if(ESPN_MAP[abbr])return ESPN_MAP[abbr];
  var dn=(display||'').toLowerCase();
  var regs=['e','s','w','m'];
  for(var ri=0;ri<regs.length;ri++){var r64=RD[regs[ri]].r64;for(var gi=0;gi<r64.length;gi++){for(var pi=0;pi<2;pi++){var tn=r64[gi][pi].n.toLowerCase();if(dn.indexOf(tn)!==-1||tn.indexOf(dn.split(' ')[0])!==-1)return r64[gi][pi].n;}}}
  return null;
}

// ── ESPN fetch ────────────────────────────────────────────
window.fetchESPN=function(){setSyncStatus('loading');doFetch(0);};
function doFetch(pi){
  if(pi>=PROXIES.length){setSyncStatus('error');return;}
  var url=pi===0?ESPN_URL:PROXIES[pi]+encodeURIComponent(ESPN_URL);
  fetch(url)
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){if(d.contents)d=JSON.parse(d.contents);processData(d);lastSync=new Date();})
    .catch(function(e){console.warn('Attempt '+pi+' failed:',e);doFetch(pi+1);});
}

function processData(data){
  var events=data.events||[];
  var idx=buildIdx();
  var changed=false, hasLive=false;
  var seeds=getAllSeeds();

  for(var ei=0;ei<events.length;ei++){
    var evt=events[ei];
    var comp=evt.competitions&&evt.competitions[0];
    if(!comp)continue;
    var stType=comp.status&&comp.status.type;
    if(!stType)continue;
    var state=stType.state; // 'pre','in','post'
    if(state==='pre')continue;

    var comps=comp.competitors||[];
    if(comps.length<2)continue;
    var tA=comps[0],tB=comps[1];
    var nA=mapName(tA.team.abbreviation,tA.team.displayName);
    var nB=mapName(tB.team.abbreviation,tB.team.displayName);
    if(!nA||!nB)continue;

    var scA=parseInt(tA.score||0,10);
    var scB=parseInt(tB.score||0,10);
    var clock=comp.status.displayClock||'';
    var period=comp.status.period||0;
    var pStr=period===1?'1st':period===2?'2nd':period>2?'OT':'';

    var gameId=idx[nA+'|'+nB];
    if(!gameId){idx=buildIdx();gameId=idx[nA+'|'+nB];}
    if(!gameId)continue;

    if(state==='in'){
      hasLive=true;
      gameScores[gameId]={nA:nA,nB:nB,scA:scA,scB:scB,clock:clock,period:pStr,state:'live'};
      changed=true;
    } else if(stType.completed){
      gameScores[gameId]={nA:nA,nB:nB,scA:scA,scB:scB,clock:'',period:'',state:'final'};
      var winner=tA.winner?nA:(tB.winner?nB:null);
      if(winner){
        var ws=seeds[winner]||0;
        if(!results[gameId]||results[gameId].n!==winner){
          results[gameId]={s:ws,n:winner};
          idx=buildIdx(); changed=true;
        }
      }
      changed=true;
    }
  }

  if(changed){saveResults();saveScores();render();}
  setSyncStatus(hasLive?'live':'ok');
  if(syncTimer)clearTimeout(syncTimer);
  if(hasLive)syncTimer=setTimeout(function(){fetchESPN();},60000);
}

function setSyncStatus(s){
  var dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-status');
  if(!dot||!txt)return;
  if(s==='loading'){dot.className='sync-dot';txt.className='sync-status';txt.textContent='Syncing...';}
  else if(s==='ok'){dot.className='sync-dot ok';txt.className='sync-status ok';txt.textContent='Synced '+(lastSync?lastSync.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'');}
  else if(s==='live'){dot.className='sync-dot live';txt.className='sync-status live';txt.textContent='Live \u2022 Auto-refresh';}
  else{dot.className='sync-dot';txt.className='sync-status err';txt.textContent='Sync failed \u2014 retry';}
}

// ── Mode ──────────────────────────────────────────────────
window.setMode=function(m){
  mode=m;
  document.getElementById('btn-picks').className  ='mode-btn'+(m==='picks'  ?' active-picks':'');
  document.getElementById('btn-results').className='mode-btn'+(m==='results'?' active-results':'');
  document.getElementById('mode-banner').className='mode-banner'+(m==='results'?' results':'');
  render();
};

// ── Pick handlers ─────────────────────────────────────────
window.pickTeam=function(id,n,s){if(mode!=='picks')return;var c=picks[id];if(c&&c.n===n){delete picks[id];cascRm(id,n,picks);}else{picks[id]={s:s,n:n};cascInv(id,picks,getTeams);}savePicks();render();};
window.pickFF=function(id,n,s){if(mode!=='picks')return;if(picks[id]&&picks[id].n===n){delete picks[id];if(picks['ch']&&picks['ch'].n===n)delete picks['ch'];}else{picks[id]={s:s,n:n};if(picks['ch']){var f0=picks['ff0'],f1=picks['ff1'],cn=picks['ch'].n;if(!f0||!f1||(cn!==f0.n&&cn!==f1.n))delete picks['ch'];}}savePicks();render();};
window.pickChamp=function(n,s){if(mode!=='picks')return;if(picks['ch']&&picks['ch'].n===n)delete picks['ch'];else picks['ch']={s:s,n:n};savePicks();render();};
window.recordResult=function(id,n,s){if(mode!=='results')return;if(results[id]&&results[id].n===n){delete results[id];cascRm(id,n,results);}else{results[id]={s:s,n:n};cascInv(id,results,getResultTeams);}saveResults();render();};
window.recordFF=function(id,n,s){if(mode!=='results')return;if(results[id]&&results[id].n===n){delete results[id];if(results['ch']&&results['ch'].n===n)delete results['ch'];}else{results[id]={s:s,n:n};if(results['ch']){var f0=results['ff0'],f1=results['ff1'],cn=results['ch'].n;if(!f0||!f1||(cn!==f0.n&&cn!==f1.n))delete results['ch'];}}saveResults();render();};
window.recordChamp=function(n,s){if(mode!=='results')return;if(results['ch']&&results['ch'].n===n)delete results['ch'];else results['ch']={s:s,n:n};saveResults();render();};
window.resetPrompt=function(){var c=confirm('OK = Reset Picks only\nCancel = Reset Everything (picks + results + scores)');if(c){picks={};savePicks();}else{picks={};results={};gameScores={};savePicks();saveResults();saveScores();}render();};

function cascRm(id,name,store){var p=id.split('_'),reg=p[0],rd=parseInt(p[1],10),gi=parseInt(p[2],10);for(var r=rd+1;r<=3;r++){var ng=gid(reg,r,Math.floor(gi/Math.pow(2,r-rd)));if(store[ng]&&store[ng].n===name)delete store[ng];}if(store['ff0']&&store['ff0'].n===name)delete store['ff0'];if(store['ff1']&&store['ff1'].n===name)delete store['ff1'];if(store['ch']&&store['ch'].n===name)delete store['ch'];}
function cascInv(id,store,gtFn){var p=id.split('_'),reg=p[0],rd=parseInt(p[1],10),gi=parseInt(p[2],10);for(var r=rd+1;r<=3;r++){var ni=Math.floor(gi/Math.pow(2,r-rd)),ng=gid(reg,r,ni);if(store[ng]){var ts=gtFn(reg,r,ni);if(!(ts[0]&&ts[0].n===store[ng].n)&&!(ts[1]&&ts[1].n===store[ng].n)){var cl=store[ng].n;delete store[ng];if(store['ff0']&&store['ff0'].n===cl)delete store['ff0'];if(store['ff1']&&store['ff1'].n===cl)delete store['ff1'];if(store['ch']&&store['ch'].n===cl)delete store['ch'];}}}}

// ── Score calc ────────────────────────────────────────────
function calcScore(){var c=0,t=0,pts=0,regs=['e','s','w','m'];for(var ri=0;ri<regs.length;ri++){var reg=regs[ri];for(var rd=0;rd<=3;rd++){for(var g=0;g<Math.pow(2,3-rd);g++){var res=results[gid(reg,rd,g)];if(!res)continue;t++;var pk=picks[gid(reg,rd,g)];if(pk&&pk.n===res.n){c++;pts+=POINTS[rd];}}}}['ff0','ff1'].forEach(function(f){var res=results[f];if(!res)return;t++;var pk=picks[f];if(pk&&pk.n===res.n){c++;pts+=POINTS[4];}});var cr=results['ch'];if(cr){t++;var cp=picks['ch'];if(cp&&cp.n===cr.n){c++;pts+=POINTS[5];}}return{correct:c,total:t,points:pts};}

// ── HTML builders ─────────────────────────────────────────
function makeTeamBtn(t,gameId,pickCb,resultCb,sc){
  if(!t)return'<button class="team tbd" disabled><span class="sd">-</span><span class="nm">TBD</span></button>';
  var pick=picks[gameId],res=results[gameId],isPicked=pick&&pick.n===t.n,isOther=pick&&pick.n!==t.n;
  var cls='team',verdict='',cb='',scoreHtml='';

  if(sc){
    var myScore=sc.nA===t.n?sc.scA:sc.scB;
    var theirScore=sc.nA===t.n?sc.scB:sc.scA;
    scoreHtml='<span class="sc">'+myScore+'</span>';
    if(sc.state==='live'){cls+=myScore>theirScore?' leading':' trailing';}
    else if(sc.state==='final'){cls+=myScore>theirScore?' actual-win':' actual-loss';}
  }

  if(mode==='picks'){
    cb=pickCb;
    if(res){
      if(isPicked){
        // override score-derived class with correct/wrong
        cls=cls.replace(' actual-win','').replace(' actual-loss','').replace(' leading','').replace(' trailing','');
        cls+=res.n===t.n?' correct':' wrong';
        verdict=res.n===t.n?'<span class="vd">&#10003;</span>':'<span class="vd">&#10007;</span>';
      } else if(isOther) cls+=' unpicked';
    } else {
      if(isPicked) cls+=' picked'; else if(isOther) cls+=' unpicked';
    }
  } else {
    cb=resultCb;
    if(res&&!sc){cls+=res.n===t.n?' actual-win':' actual-loss';}
  }

  return'<button class="'+cls+'" onclick="'+cb+'"><span class="sd">'+t.s+'</span><span class="nm">'+t.n+'</span>'+scoreHtml+verdict+'</button>';
}

function makeGame(gameId,t0,t1){
  var n0=sN(t0),s0=sS(t0),n1=sN(t1),s1=sS(t1);
  var pcb0="pickTeam('"+gameId+"','"+n0+"',"+s0+")",pcb1="pickTeam('"+gameId+"','"+n1+"',"+s1+")";
  var rcb0="recordResult('"+gameId+"','"+n0+"',"+s0+")",rcb1="recordResult('"+gameId+"','"+n1+"',"+s1+")";
  var resCls=mode==='results'?' results-mode':'';
  var sc=gameScores[gameId]||null;
  var gameCls='',footer='';
  if(sc){
    if(sc.state==='live'){
      gameCls=' is-live';
      footer='<div class="game-footer live">&#9679; '+sc.period+' '+sc.clock+'</div>';
    } else if(sc.state==='final'){
      gameCls=' is-final';
      footer='<div class="game-footer final">Final</div>';
    }
  }
  return'<div class="game'+resCls+gameCls+'">'
    +makeTeamBtn(t0,gameId,pcb0,rcb0,sc)+'<div class="divline"></div>'
    +makeTeamBtn(t1,gameId,pcb1,rcb1,sc)+footer+'</div>';
}

function makeFFBtn(ffId,t){
  if(!t)return'<button class="team tbd" disabled><span class="sd">-</span><span class="nm">TBD</span></button>';
  var pick=picks[ffId],res=results[ffId],isPicked=pick&&pick.n===t.n;
  var cls='team',verdict='',cb='';
  if(mode==='picks'){
    cb="pickFF('"+ffId+"','"+sN(t)+"',"+sS(t)+")";
    if(res){if(isPicked){cls+=res.n===t.n?' correct':' wrong';verdict=res.n===t.n?'<span class="vd">&#10003;</span>':'<span class="vd">&#10007;</span>';}}
    else{if(isPicked)cls+=' picked';else if(pick)cls+=' unpicked';}
  } else {cb="recordFF('"+ffId+"','"+sN(t)+"',"+sS(t)+")";if(res)cls+=res.n===t.n?' actual-win':' actual-loss';}
  return'<button class="'+cls+'" onclick="'+cb+'"><span class="sd">'+(t.s||'')+'</span><span class="nm">'+t.n+'</span>'+verdict+'</button>';
}

function makeChampBtn(t){
  if(!t)return'<button class="team tbd" disabled><span class="sd">-</span><span class="nm">TBD</span></button>';
  var pick=picks['ch'],res=results['ch'],isPicked=pick&&pick.n===t.n;
  var cls='team',verdict='',cb='';
  if(mode==='picks'){
    cb="pickChamp('"+sN(t)+"',"+sS(t)+")";
    if(res){if(isPicked){cls+=res.n===t.n?' correct':' wrong';verdict=res.n===t.n?'<span class="vd">&#10003;</span>':'<span class="vd">&#10007;</span>';}}
    else{if(isPicked)cls+=' picked';else if(pick)cls+=' unpicked';}
  } else {cb="recordChamp('"+sN(t)+"',"+sS(t)+")";if(res)cls+=res.n===t.n?' actual-win':' actual-loss';}
  return'<button class="'+cls+'" onclick="'+cb+'"><span class="sd">'+(t.s||'')+'</span><span class="nm">'+t.n+'</span>'+verdict+'</button>';
}

function renderRegion(reg,reversed){
  var data=RD[reg],roundsHtml='';
  for(var r=0;r<=3;r++){
    var nG=Math.pow(2,3-r),flex=Math.pow(2,r),gamesHtml='';
    for(var g=0;g<nG;g++){
      var gameId=gid(reg,r,g);
      var ts=r===0?RD[reg].r64[g]:(mode==='results'?getResultTeams(reg,r,g):getTeams(reg,r,g));
      var card=makeGame(gameId,ts[0],ts[1]);
      var connCls=r<3?(g%2===0?'bottom':'top'):'';
      var conn=connCls?'<span class="conn '+connCls+'"></span>':'';
      gamesHtml+='<div class="gw" style="flex:'+flex+'">'+card+conn+'</div>';
    }
    roundsHtml+='<div class="round"><div class="round-label">'+ROUND_NAMES[r]+'</div>'+gamesHtml+'</div>';
  }
  return'<div class="region"><div class="region-label" style="color:'+data.color+'">'+data.name+'</div><div class="rounds">'+roundsHtml+'</div></div>';
}

function renderCenter(){
  var f0a,f0b,f1a,f1b,ca,cb;
  if(mode==='results'){f0a=e8Result('e');f0b=e8Result('s');f1a=e8Result('w');f1b=e8Result('m');ca=results['ff0']||null;cb=results['ff1']||null;}
  else{f0a=e8Winner('e');f0b=e8Winner('s');f1a=e8Winner('w');f1b=e8Winner('m');ca=picks['ff0']||null;cb=picks['ff1']||null;}
  var ch=picks['ch'],winnerBox='';
  if(ch){var cr=results['ch'];var bCol=cr?(cr.n===ch.n?'rgba(34,197,94,.5)':'rgba(239,68,68,.4)'):'rgba(245,166,35,.4)';var vd=cr?(cr.n===ch.n?' &#10003;':' &#10007;'):'';
    winnerBox='<div class="champ-winner" style="border-color:'+bCol+'"><span class="trophy">&#127942;</span><div class="cname">'+ch.n+vd+'</div><div class="csub">2026 Champion Pick</div></div>';}
  var resCls=mode==='results'?' results-mode':'';
  return'<div class="center"><div class="center-inner">'
    +'<div class="ff-title">FINAL FOUR</div>'
    +'<div style="width:100%"><div class="ff-matchup">East &middot; South</div><div class="game'+resCls+'">'+makeFFBtn('ff0',f0a)+'<div class="divline"></div>'+makeFFBtn('ff0',f0b)+'</div></div>'
    +'<div style="width:100%"><div class="ff-matchup">West &middot; Midwest</div><div class="game'+resCls+'">'+makeFFBtn('ff1',f1a)+'<div class="divline"></div>'+makeFFBtn('ff1',f1b)+'</div></div>'
    +'<div class="champ-title">&#127942; CHAMPIONSHIP</div>'
    +'<div class="game'+resCls+'">'+makeChampBtn(ca)+'<div class="divline"></div>'+makeChampBtn(cb)+'</div>'
    +winnerBox+'</div></div>';
}

function render(){
  document.getElementById('bracket').innerHTML=
    '<div class="half left-half">'+renderRegion('e',false)+renderRegion('s',false)+'</div>'
    +renderCenter()
    +'<div class="half right-half">'+renderRegion('w',true)+renderRegion('m',true)+'</div>';
  var hc=document.getElementById('header-champ');
  hc.innerHTML=picks['ch']?'&#127942; '+picks['ch'].n:'';
  var sc=document.getElementById('header-score'),score=calcScore();
  if(score.total>0){sc.style.display='block';sc.innerHTML=score.points+' PTS &nbsp;|&nbsp; '+score.correct+'/'+score.total+' correct';}
  else sc.style.display='none';
}

render();
fetchESPN();
