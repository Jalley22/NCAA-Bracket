<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 March Madness Bracket</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080b10;
  --surface: #12181f;
  --border: #253040;
  --text: #ccd6e0;
  --muted: #50647a;
  --accent: #f5a623;
  --green: #22c55e;
  --red: #ef4444;
  --line: rgba(60, 110, 170, 0.5);
  --game-w: 150px;
  --round-w: 174px;
  --conn: 24px;
  --slot-h: 74px;
  --east-c: #4a9adb;
  --south-c: #e05555;
  --west-c: #46b86a;
  --midwest-c: #e08c30;
}
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; overflow-x: auto; }

/* ── Header ── */
header {
  background: linear-gradient(180deg,#120e00 0%,var(--bg) 100%);
  border-bottom: 2px solid #2a1e00; padding: 16px 24px 12px;
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between; min-width: 1580px;
}
.header-title h1 {
  font-family: 'Bebas Neue'; font-size: 2.4rem; letter-spacing: .14em;
  background: linear-gradient(90deg,#c87d10,#ffd060,#f5a623);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-title p { font-size: .7rem; color: var(--muted); letter-spacing: .22em; text-transform: uppercase; margin-top: 2px; }
.header-controls { display: flex; align-items: center; gap: 12px; }
.champ-badge { font-family: 'Bebas Neue'; font-size: 1.05rem; letter-spacing: .1em; color: var(--accent); }
.score-badge {
  font-family: 'Bebas Neue'; font-size: 1rem; letter-spacing: .1em;
  color: var(--green); background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3);
  padding: 4px 12px; border-radius: 3px;
}

/* Mode toggle */
.mode-toggle { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.mode-btn {
  font-family: 'Bebas Neue'; font-size: .9rem; letter-spacing: .1em;
  padding: 5px 14px; cursor: pointer; border: none; transition: background .15s, color .15s;
  background: transparent; color: var(--muted);
}
.mode-btn.active-picks  { background: rgba(245,166,35,.2); color: var(--accent); }
.mode-btn.active-results { background: rgba(239,68,68,.2); color: #ff8080; }

.btn-reset {
  background: rgba(245,166,35,.12); border: 1px solid var(--accent); color: var(--accent);
  font-family: 'Bebas Neue'; font-size: 1rem; letter-spacing: .1em; padding: 5px 18px;
  cursor: pointer; border-radius: 3px; transition: background .18s;
}
.btn-reset:hover { background: rgba(245,166,35,.28); }

/* Mode banner */
.mode-banner {
  padding: 5px 24px; font-size: .7rem; font-weight: 700; letter-spacing: .18em;
  text-align: center; text-transform: uppercase; min-width: 1580px; display: none;
}
.mode-banner.results { background: rgba(239,68,68,.1); border-bottom: 1px solid rgba(239,68,68,.25); color: #ff8080; display: block; }

/* ── Layout ── */
.bracket-wrap { padding: 20px; min-width: 1580px; }
.bracket { display: flex; flex-direction: row; align-items: flex-start; }
.half { display: flex; flex-direction: column; gap: 28px; }
.region { display: flex; flex-direction: column; }
.region-label {
  font-family: 'Bebas Neue'; font-size: .95rem; letter-spacing: .2em;
  text-align: center; padding: 3px 0 5px; border-bottom: 1px solid var(--border);
}
.rounds { display: flex; flex-direction: row; height: calc(8 * var(--slot-h)); }
.right-half .rounds { flex-direction: row-reverse; }
.round { display: flex; flex-direction: column; width: var(--round-w); position: relative; }
.round-label { font-size: .58rem; text-transform: uppercase; letter-spacing: .18em; color: var(--muted); text-align: center; padding: 0 0 4px; flex-shrink: 0; }
.gw { flex: 1; display: flex; align-items: center; position: relative; padding: 2px 0; }
.left-half .gw::before { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: var(--conn); height: 1px; background: var(--line); }
.right-half .gw::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: var(--conn); height: 1px; background: var(--line); }
.conn { position: absolute; width: var(--conn); }
.left-half .gw .conn { right: 0; }
.right-half .gw .conn { left: 0; }
.left-half .gw .conn.bottom { top: 50%; height: 50%; border-right: 1px solid var(--line); border-top: 1px solid var(--line); }
.left-half .gw .conn.top    { top: 0;   height: 50%; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.right-half .gw .conn.bottom { top: 50%; height: 50%; border-left: 1px solid var(--line); border-top: 1px solid var(--line); }
.right-half .gw .conn.top    { top: 0;   height: 50%; border-left: 1px solid var(--line); border-bottom: 1px solid var(--line); }

/* ── Game card ── */
.game { width: var(--game-w); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: var(--surface); flex-shrink: 0; }
.game.results-mode { border-color: rgba(239,68,68,.35); cursor: pointer; }
.team {
  display: flex; align-items: center; gap: 4px; width: 100%; padding: 5px 6px;
  cursor: pointer; border: none; background: transparent; color: var(--text);
  font-family: 'Barlow'; font-size: .73rem; font-weight: 600; text-align: left;
  transition: background .14s; white-space: nowrap; overflow: hidden;
  min-height: 24px;
}
.team:hover:not([disabled]) { background: rgba(255,255,255,.07); }
.team .sd { font-size: .62rem; color: var(--muted); min-width: 14px; font-weight: 700; flex-shrink: 0; }
.team .nm { overflow: hidden; text-overflow: ellipsis; flex: 1; }
.team .verdict { font-size: .75rem; flex-shrink: 0; margin-left: 2px; }

/* Picks mode states */
.team.picked   { background: rgba(245,166,35,.12); color: var(--accent); }
.team.picked .sd { color: rgba(245,166,35,.5); }
.team.out      { background: rgba(255,255,255,.03); color: var(--muted); }
.team.out .nm  { text-decoration: line-through; }
.team.tbd      { color: var(--muted); cursor: default; font-weight: 400; font-style: italic; }

/* Verdict states (after results entered) */
.team.correct  { background: rgba(34,197,94,.15); color: var(--green); }
.team.correct .sd { color: rgba(34,197,94,.5); }
.team.wrong    { background: rgba(239,68,68,.1); color: var(--muted); }
.team.wrong .nm { text-decoration: line-through; }

/* Results mode states */
.team.actual-winner { background: rgba(239,68,68,.18); color: #ff9090; }
.team.actual-winner .sd { color: rgba(239,68,68,.5); }
.team.actual-loser  { background: rgba(255,255,255,.03); color: var(--muted); }
.team.actual-loser .nm { text-decoration: line-through; }

.divline { height: 1px; background: var(--border); }

/* ── Center ── */
.center {
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  width: 230px; height: calc(2 * 8 * var(--slot-h) + 28px); padding: 0 8px;
  border-left: 1px solid var(--border); border-right: 1px solid var(--border);
}
.center-inner { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; }
.ff-title    { font-family: 'Bebas Neue'; font-size: .85rem; letter-spacing: .22em; color: var(--muted); text-align: center; }
.champ-title { font-family: 'Bebas Neue'; font-size: .95rem; letter-spacing: .2em; color: var(--accent); text-align: center; }
.ff-matchup  { font-size: .58rem; color: var(--muted); text-align: center; margin-bottom: 3px; letter-spacing: .08em; text-transform: uppercase; }
.champ-winner {
  text-align: center; padding: 12px 8px; width: 100%;
  border: 1px solid rgba(245,166,35,.4); border-radius: 6px; background: rgba(245,166,35,.05);
}
.champ-winner .trophy { font-size: 1.8rem; display: block; margin-bottom: 4px; }
.champ-winner .cname  { font-family: 'Bebas Neue'; font-size: 1.3rem; letter-spacing: .1em; color: var(--accent); }
.champ-winner .csub   { font-size: .6rem; color: var(--muted); letter-spacing: .15em; text-transform: uppercase; }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>2026 MARCH MADNESS</h1>
    <p>NCAA Division I Men's Basketball Tournament &mdash; Your Personal Bracket</p>
  </div>
  <div class="header-controls">
    <div class="champ-badge" id="header-champ"></div>
    <div class="score-badge" id="header-score" style="display:none"></div>
    <div class="mode-toggle">
      <button class="mode-btn active-picks" id="btn-picks" onclick="setMode('picks')">&#9998; MY PICKS</button>
      <button class="mode-btn" id="btn-results" onclick="setMode('results')">&#10003; ENTER RESULTS</button>
    </div>
    <button class="btn-reset" onclick="resetPrompt()">&#8635; RESET</button>
  </div>
</header>
<div class="mode-banner" id="mode-banner">&#9888; RESULTS MODE &mdash; Click the actual game winner to record results</div>

<div class="bracket-wrap">
  <div class="bracket" id="bracket"></div>
</div>

<script>
var PICKS_KEY   = 'mm2026_picks';
var RESULTS_KEY = 'mm2026_results';
var ROUND_NAMES = ['First Round', 'Second Round', 'Sweet 16', 'Elite Eight'];

var RD = {
  e: {
    name: 'EAST', color: 'var(--east-c)',
    r64: [
      [{s:1,n:'Duke'},{s:16,n:'Siena'}],
      [{s:8,n:'Ohio State'},{s:9,n:'TCU'}],
      [{s:5,n:"St. John's"},{s:12,n:'N. Iowa'}],
      [{s:4,n:'Kansas'},{s:13,n:'Cal Baptist'}],
      [{s:6,n:'Louisville'},{s:11,n:'S. Florida'}],
      [{s:3,n:'Mich. State'},{s:14,n:'N. Dakota St.'}],
      [{s:7,n:'UCLA'},{s:10,n:'UCF'}],
      [{s:2,n:'UConn'},{s:15,n:'Furman'}]
    ]
  },
  s: {
    name: 'SOUTH', color: 'var(--south-c)',
    r64: [
      [{s:1,n:'Florida'},{s:16,n:'Prairie View'}],
      [{s:8,n:'Clemson'},{s:9,n:'Iowa'}],
      [{s:5,n:'Vanderbilt'},{s:12,n:'McNeese'}],
      [{s:4,n:'Nebraska'},{s:13,n:'Troy'}],
      [{s:6,n:'N. Carolina'},{s:11,n:'VCU'}],
      [{s:3,n:'Illinois'},{s:14,n:'Penn'}],
      [{s:7,n:"Saint Mary's"},{s:10,n:'Texas A&M'}],
      [{s:2,n:'Houston'},{s:15,n:'Idaho'}]
    ]
  },
  w: {
    name: 'WEST', color: 'var(--west-c)',
    r64: [
      [{s:1,n:'Arizona'},{s:16,n:'LIU'}],
      [{s:8,n:'Wisconsin'},{s:9,n:'High Point'}],
      [{s:5,n:'Villanova'},{s:12,n:'Utah State'}],
      [{s:4,n:'Arkansas'},{s:13,n:"Hawai'i"}],
      [{s:6,n:'Miami (FL)'},{s:11,n:'Missouri'}],
      [{s:3,n:'Gonzaga'},{s:14,n:'Kennesaw St.'}],
      [{s:7,n:'BYU'},{s:10,n:'Texas'}],
      [{s:2,n:'Purdue'},{s:15,n:'Queens'}]
    ]
  },
  m: {
    name: 'MIDWEST', color: 'var(--midwest-c)',
    r64: [
      [{s:1,n:'Michigan'},{s:16,n:'Howard'}],
      [{s:8,n:'Georgia'},{s:9,n:'Saint Louis'}],
      [{s:5,n:'Alabama'},{s:12,n:'Hofstra'}],
      [{s:4,n:'Texas Tech'},{s:13,n:'Akron'}],
      [{s:6,n:'Tennessee'},{s:11,n:'Miami (OH)'}],
      [{s:3,n:'Virginia'},{s:14,n:'Wright State'}],
      [{s:7,n:'Kentucky'},{s:10,n:'Santa Clara'}],
      [{s:2,n:'Iowa State'},{s:15,n:'Tenn. State'}]
    ]
  }
};

// ── State ────────────────────────────────────────────────
var picks   = {};
var results = {};
var mode    = 'picks'; // 'picks' | 'results'

try { var _p = localStorage.getItem(PICKS_KEY);   if (_p) picks   = JSON.parse(_p); } catch(_e) {}
try { var _r = localStorage.getItem(RESULTS_KEY); if (_r) results = JSON.parse(_r); } catch(_e) {}

function savePicks()   { try { localStorage.setItem(PICKS_KEY,   JSON.stringify(picks));   } catch(_e) {} }
function saveResults() { try { localStorage.setItem(RESULTS_KEY, JSON.stringify(results)); } catch(_e) {} }

// ── Mode ─────────────────────────────────────────────────
window.setMode = function(m) {
  mode = m;
  document.getElementById('btn-picks').className   = 'mode-btn' + (m === 'picks'   ? ' active-picks'   : '');
  document.getElementById('btn-results').className = 'mode-btn' + (m === 'results' ? ' active-results' : '');
  var banner = document.getElementById('mode-banner');
  banner.className = 'mode-banner' + (m === 'results' ? ' results' : '');
  render();
};

// ── Helpers ───────────────────────────────────────────────
function gid(reg, rd, g) { return reg + '_' + rd + '_' + g; }

function getTeams(reg, rd, g) {
  if (rd === 0) { return RD[reg].r64[g]; }
  var t0 = picks[gid(reg, rd-1, g*2)]   || null;
  var t1 = picks[gid(reg, rd-1, g*2+1)] || null;
  return [t0, t1];
}

function getResultTeams(reg, rd, g) {
  if (rd === 0) { return RD[reg].r64[g]; }
  var t0 = results[gid(reg, rd-1, g*2)]   || null;
  var t1 = results[gid(reg, rd-1, g*2+1)] || null;
  return [t0, t1];
}

function e8Winner(reg)       { return picks[gid(reg,3,0)]   || null; }
function e8Result(reg)       { return results[gid(reg,3,0)] || null; }

function safeAttr(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,'\\x27').replace(/"/g,'&quot;');
}

// ── Score calculation ─────────────────────────────────────
var POINTS = [10, 20, 40, 80, 160, 320];

function calcScore() {
  var correct = 0, total = 0, points = 0;
  var regs = ['e','s','w','m'];
  for (var ri = 0; ri < regs.length; ri++) {
    var reg = regs[ri];
    for (var rd = 0; rd <= 3; rd++) {
      var numGames = Math.pow(2, 3-rd);
      for (var g = 0; g < numGames; g++) {
        var gameId = gid(reg, rd, g);
        var res = results[gameId];
        if (!res) continue;
        total++;
        var pick = picks[gameId];
        if (pick && pick.n === res.n) { correct++; points += POINTS[rd]; }
      }
    }
  }
  // FF (round index 4)
  ['ff0','ff1'].forEach(function(ffId) {
    var res = results[ffId]; if (!res) return;
    total++;
    var pick = picks[ffId]; if (pick && pick.n === res.n) { correct++; points += POINTS[4]; }
  });
  // Champ (round index 5)
  var cRes = results['ch'];
  if (cRes) {
    total++;
    var cPick = picks['ch'];
    if (cPick && cPick.n === cRes.n) { correct++; points += POINTS[5]; }
  }
  return { correct: correct, total: total, points: points };
}

// ── Pick handlers ─────────────────────────────────────────
window.pickTeam = function(gameId, name, seed) {
  if (mode !== 'picks') return;
  var cur = picks[gameId];
  if (cur && cur.n === name) {
    delete picks[gameId];
    cascadeRemove(gameId, name);
  } else {
    picks[gameId] = { s: seed, n: name };
    cascadeInvalidate(gameId);
  }
  savePicks(); render();
};

window.pickFF = function(ffId, name, seed) {
  if (mode !== 'picks') return;
  var cur = picks[ffId];
  if (cur && cur.n === name) {
    delete picks[ffId];
    if (picks['ch'] && picks['ch'].n === name) { delete picks['ch']; }
  } else {
    picks[ffId] = { s: seed, n: name };
    if (picks['ch']) {
      var pf0 = picks['ff0'], pf1 = picks['ff1'], chN = picks['ch'].n;
      if (!pf0 || !pf1 || (chN !== pf0.n && chN !== pf1.n)) { delete picks['ch']; }
    }
  }
  savePicks(); render();
};

window.pickChamp = function(name, seed) {
  if (mode !== 'picks') return;
  if (picks['ch'] && picks['ch'].n === name) { delete picks['ch']; }
  else { picks['ch'] = { s: seed, n: name }; }
  savePicks(); render();
};

// ── Result handlers ───────────────────────────────────────
window.recordResult = function(gameId, name, seed) {
  if (mode !== 'results') return;
  var cur = results[gameId];
  if (cur && cur.n === name) {
    delete results[gameId];
    cascadeResultRemove(gameId, name);
  } else {
    results[gameId] = { s: seed, n: name };
    cascadeResultInvalidate(gameId);
  }
  saveResults(); render();
};

window.recordFFResult = function(ffId, name, seed) {
  if (mode !== 'results') return;
  if (results[ffId] && results[ffId].n === name) {
    delete results[ffId];
    if (results['ch'] && results['ch'].n === name) { delete results['ch']; }
  } else {
    results[ffId] = { s: seed, n: name };
    if (results['ch']) {
      var rf0 = results['ff0'], rf1 = results['ff1'], chN = results['ch'].n;
      if (!rf0 || !rf1 || (chN !== rf0.n && chN !== rf1.n)) { delete results['ch']; }
    }
  }
  saveResults(); render();
};

window.recordChampResult = function(name, seed) {
  if (mode !== 'results') return;
  if (results['ch'] && results['ch'].n === name) { delete results['ch']; }
  else { results['ch'] = { s: seed, n: name }; }
  saveResults(); render();
};

// ── Reset ────────────────────────────────────────────────
window.resetPrompt = function() {
  var choice = confirm('Reset MY PICKS only?\n\nOK = Reset Picks only\nCancel = Reset Everything (picks + results)');
  if (choice) {
    picks = {}; savePicks();
  } else {
    picks = {}; results = {};
    savePicks(); saveResults();
  }
  render();
};

// ── Cascade helpers ───────────────────────────────────────
function cascadeRemove(gameId, name) {
  var parts = gameId.split('_'), reg = parts[0], rd = parseInt(parts[1],10), gi = parseInt(parts[2],10);
  for (var r = rd+1; r <= 3; r++) {
    var ng = gid(reg, r, Math.floor(gi / Math.pow(2, r-rd)));
    if (picks[ng] && picks[ng].n === name) { delete picks[ng]; }
  }
  if (picks['ff0'] && picks['ff0'].n === name) { delete picks['ff0']; }
  if (picks['ff1'] && picks['ff1'].n === name) { delete picks['ff1']; }
  if (picks['ch']  && picks['ch'].n  === name) { delete picks['ch'];  }
}

function cascadeInvalidate(gameId) {
  var parts = gameId.split('_'), reg = parts[0], rd = parseInt(parts[1],10), gi = parseInt(parts[2],10);
  for (var r = rd+1; r <= 3; r++) {
    var ng = gid(reg, r, Math.floor(gi / Math.pow(2, r-rd)));
    if (picks[ng]) {
      var ts = getTeams(reg, r, Math.floor(gi / Math.pow(2, r-rd)));
      if (!(ts[0] && ts[0].n === picks[ng].n) && !(ts[1] && ts[1].n === picks[ng].n)) {
        var cleared = picks[ng].n; delete picks[ng];
        if (picks['ff0'] && picks['ff0'].n === cleared) { delete picks['ff0']; }
        if (picks['ff1'] && picks['ff1'].n === cleared) { delete picks['ff1']; }
        if (picks['ch']  && picks['ch'].n  === cleared) { delete picks['ch'];  }
      }
    }
  }
}

function cascadeResultRemove(gameId, name) {
  var parts = gameId.split('_'), reg = parts[0], rd = parseInt(parts[1],10), gi = parseInt(parts[2],10);
  for (var r = rd+1; r <= 3; r++) {
    var ng = gid(reg, r, Math.floor(gi / Math.pow(2, r-rd)));
    if (results[ng] && results[ng].n === name) { delete results[ng]; }
  }
  if (results['ff0'] && results['ff0'].n === name) { delete results['ff0']; }
  if (results['ff1'] && results['ff1'].n === name) { delete results['ff1']; }
  if (results['ch']  && results['ch'].n  === name) { delete results['ch'];  }
}

function cascadeResultInvalidate(gameId) {
  var parts = gameId.split('_'), reg = parts[0], rd = parseInt(parts[1],10), gi = parseInt(parts[2],10);
  for (var r = rd+1; r <= 3; r++) {
    var ni = Math.floor(gi / Math.pow(2, r-rd));
    var ng = gid(reg, r, ni);
    if (results[ng]) {
      var ts = getResultTeams(reg, r, ni);
      if (!(ts[0] && ts[0].n === results[ng].n) && !(ts[1] && ts[1].n === results[ng].n)) {
        var cleared = results[ng].n; delete results[ng];
        if (results['ff0'] && results['ff0'].n === cleared) { delete results['ff0']; }
        if (results['ff1'] && results['ff1'].n === cleared) { delete results['ff1']; }
        if (results['ch']  && results['ch'].n  === cleared) { delete results['ch'];  }
      }
    }
  }
}

// ── HTML builders ─────────────────────────────────────────
function safeN(t) { return t ? safeAttr(t.n) : ''; }
function safeS(t) { return t ? (t.s || 0) : 0; }

function makeTeamBtn(t, gameId) {
  if (!t) {
    return '<button class="team tbd" disabled><span class="sd">-</span><span class="nm">TBD</span></button>';
  }
  var pick   = picks[gameId];
  var result = results[gameId];
  var isPicked = pick && pick.n === t.n;
  var isOther  = pick && pick.n !== t.n;
  var cls = 'team';
  var verdict = '';
  var cb = '';

  if (mode === 'picks') {
    cb = "pickTeam('" + gameId + "','" + safeN(t) + "'," + safeS(t) + ")";
    if (result) {
      // result is known — show correct/wrong
      if (isPicked) {
        if (result.n === t.n) { cls += ' correct'; verdict = '<span class="verdict">&#10003;</span>'; }
        else                  { cls += ' wrong';   verdict = '<span class="verdict">&#10007;</span>'; }
      } else if (isOther) {
        cls += ' out';
      }
    } else {
      if (isPicked) { cls += ' picked'; }
      else if (isOther) { cls += ' out'; }
    }
  } else {
    // results mode
    cb = "recordResult('" + gameId + "','" + safeN(t) + "'," + safeS(t) + ")";
    if (result) {
      if (result.n === t.n) { cls += ' actual-winner'; }
      else                  { cls += ' actual-loser';  }
    }
  }

  return '<button class="' + cls + '" onclick="' + cb + '">'
    + '<span class="sd">' + t.s + '</span>'
    + '<span class="nm">' + t.n + '</span>'
    + verdict
    + '</button>';
}

function makeGame(gameId, t0, t1) {
  var resCls = (mode === 'results') ? ' results-mode' : '';
  return '<div class="game' + resCls + '">'
    + makeTeamBtn(t0, gameId)
    + '<div class="divline"></div>'
    + makeTeamBtn(t1, gameId)
    + '</div>';
}

function makeFFBtn(ffId, t, isResult) {
  if (!t) {
    return '<button class="team tbd" disabled><span class="sd">-</span><span class="nm">TBD</span></button>';
  }
  var pick   = picks[ffId];
  var result = results[ffId];
  var isPicked = pick && pick.n === t.n;
  var cls = 'team';
  var verdict = '';
  var cb = '';

  if (mode === 'picks') {
    cb = "pickFF('" + ffId + "','" + safeN(t) + "'," + safeS(t) + ")";
    if (result) {
      if (isPicked) {
        if (result.n === t.n) { cls += ' correct'; verdict = '<span class="verdict">&#10003;</span>'; }
        else                  { cls += ' wrong';   verdict = '<span class="verdict">&#10007;</span>'; }
      }
    } else {
      if (isPicked) { cls += ' picked'; }
      else if (pick) { cls += ' out'; }
    }
  } else {
    cb = "recordFFResult('" + ffId + "','" + safeN(t) + "'," + safeS(t) + ")";
    if (result) {
      cls += (result.n === t.n ? ' actual-winner' : ' actual-loser');
    }
  }

  return '<button class="' + cls + '" onclick="' + cb + '">'
    + '<span class="sd">' + (t.s||'') + '</span>'
    + '<span class="nm">' + t.n + '</span>'
    + verdict
    + '</button>';
}

function makeChampBtn(t) {
  if (!t) {
    return '<button class="team tbd" disabled><span class="sd">-</span><span class="nm">TBD</span></button>';
  }
  var pick   = picks['ch'];
  var result = results['ch'];
  var isPicked = pick && pick.n === t.n;
  var cls = 'team';
  var verdict = '';
  var cb = '';

  if (mode === 'picks') {
    cb = "pickChamp('" + safeN(t) + "'," + safeS(t) + ")";
    if (result) {
      if (isPicked) {
        if (result.n === t.n) { cls += ' correct'; verdict = '<span class="verdict">&#10003;</span>'; }
        else                  { cls += ' wrong';   verdict = '<span class="verdict">&#10007;</span>'; }
      }
    } else {
      if (isPicked) { cls += ' picked'; }
      else if (pick) { cls += ' out'; }
    }
  } else {
    cb = "recordChampResult('" + safeN(t) + "'," + safeS(t) + ")";
    if (result) {
      cls += (result.n === t.n ? ' actual-winner' : ' actual-loser');
    }
  }

  return '<button class="' + cls + '" onclick="' + cb + '">'
    + '<span class="sd">' + (t.s||'') + '</span>'
    + '<span class="nm">' + t.n + '</span>'
    + verdict
    + '</button>';
}

// ── Region renderer ───────────────────────────────────────
function renderRegion(reg, reversed) {
  var data = RD[reg];
  var roundsHtml = '';

  for (var r = 0; r <= 3; r++) {
    var numGames = Math.pow(2, 3-r);
    var flex = Math.pow(2, r);
    var gamesHtml = '';

    for (var g = 0; g < numGames; g++) {
      var gameId = gid(reg, r, g);
      var ts = (mode === 'results') ? getResultTeams(reg, r, g) : getTeams(reg, r, g);
      // In picks mode round 0 always shows original teams
      if (r === 0) { ts = RD[reg].r64[g]; }
      var card = makeGame(gameId, ts[0], ts[1]);
      var connCls = '';
      if (r < 3) { connCls = g % 2 === 0 ? 'bottom' : 'top'; }
      var conn = connCls ? '<span class="conn ' + connCls + '"></span>' : '';
      gamesHtml += '<div class="gw" style="flex:' + flex + '">' + card + conn + '</div>';
    }

    roundsHtml += '<div class="round"><div class="round-label">' + ROUND_NAMES[r] + '</div>' + gamesHtml + '</div>';
  }

  return '<div class="region">'
    + '<div class="region-label" style="color:' + data.color + '">' + data.name + '</div>'
    + '<div class="rounds">' + roundsHtml + '</div>'
    + '</div>';
}

// ── Center renderer ───────────────────────────────────────
function renderCenter() {
  var f0a, f0b, f1a, f1b, ca, cb;

  if (mode === 'results') {
    f0a = e8Result('e'); f0b = e8Result('s');
    f1a = e8Result('w'); f1b = e8Result('m');
    ca  = results['ff0'] || null;
    cb  = results['ff1'] || null;
  } else {
    f0a = e8Winner('e'); f0b = e8Winner('s');
    f1a = e8Winner('w'); f1b = e8Winner('m');
    ca  = picks['ff0'] || null;
    cb  = picks['ff1'] || null;
  }

  var ch = picks['ch'];
  var winnerBox = '';
  if (ch) {
    var chResult = results['ch'];
    var chBorder = chResult ? (chResult.n === ch.n ? 'rgba(34,197,94,.5)' : 'rgba(239,68,68,.4)') : 'rgba(245,166,35,.4)';
    var chVerdict = chResult ? (chResult.n === ch.n ? ' &#10003;' : ' &#10007;') : '';
    winnerBox = '<div class="champ-winner" style="border-color:' + chBorder + '">'
      + '<span class="trophy">&#127942;</span>'
      + '<div class="cname">' + ch.n + chVerdict + '</div>'
      + '<div class="csub">2026 Champion Pick</div>'
      + '</div>';
  }

  var resCls = mode === 'results' ? ' results-mode' : '';

  return '<div class="center"><div class="center-inner">'
    + '<div class="ff-title">FINAL FOUR</div>'
    + '<div style="width:100%"><div class="ff-matchup">East &middot; South</div>'
    + '<div class="game' + resCls + '">' + makeFFBtn('ff0',f0a) + '<div class="divline"></div>' + makeFFBtn('ff0',f0b) + '</div></div>'
    + '<div style="width:100%"><div class="ff-matchup">West &middot; Midwest</div>'
    + '<div class="game' + resCls + '">' + makeFFBtn('ff1',f1a) + '<div class="divline"></div>' + makeFFBtn('ff1',f1b) + '</div></div>'
    + '<div class="champ-title">&#127942; CHAMPIONSHIP</div>'
    + '<div class="game' + resCls + '">' + makeChampBtn(ca) + '<div class="divline"></div>' + makeChampBtn(cb) + '</div>'
    + winnerBox
    + '</div></div>';
}

// ── Main render ───────────────────────────────────────────
function render() {
  document.getElementById('bracket').innerHTML =
    '<div class="half left-half">'
      + renderRegion('e', false)
      + renderRegion('s', false)
    + '</div>'
    + renderCenter()
    + '<div class="half right-half">'
      + renderRegion('w', true)
      + renderRegion('m', true)
    + '</div>';

  var hc = document.getElementById('header-champ');
  hc.innerHTML = picks['ch'] ? '&#127942; ' + picks['ch'].n : '';

  var sc = document.getElementById('header-score');
  var score = calcScore();
  if (score.total > 0) {
    sc.style.display = 'block';
    sc.innerHTML = score.points + ' PTS &nbsp;|&nbsp; ' + score.correct + '/' + score.total + ' correct';
  } else {
    sc.style.display = 'none';
  }
}

render();
</script>
